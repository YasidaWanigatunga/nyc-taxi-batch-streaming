x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:7.6.1
  environment: &kafka-common-env
    KAFKA_PROCESS_ROLES: broker,controller
    KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:29093,2@kafka2:29093,3@kafka3:29093
    KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
    KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
    KAFKA_DEFAULT_REPLICATION_FACTOR: 3
    KAFKA_MIN_INSYNC_REPLICAS: 2
    KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    CLUSTER_ID: "MkU3EEtHTv6vQ8k9Zx2wBA"
  healthcheck:
    test: ["CMD-SHELL", "kafka-topics --bootstrap-server $$(hostname):29092 --list || exit 1"]
    interval: 15s
    timeout: 10s
    retries: 20
    start_period: 60s

services:
  kafka1:
    <<: *kafka-common
    container_name: kafka1
    ports:
      - "9092:9092"
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: INTERNAL://kafka1:29092,CONTROLLER://kafka1:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka1:29092,EXTERNAL://localhost:9092
    volumes:
      - kafka1-data:/var/lib/kafka/data

  kafka2:
    <<: *kafka-common
    container_name: kafka2
    ports:
      - "9093:9093"
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 2
      KAFKA_LISTENERS: INTERNAL://kafka2:29092,CONTROLLER://kafka2:29093,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka2:29092,EXTERNAL://localhost:9093
    volumes:
      - kafka2-data:/var/lib/kafka/data

  kafka3:
    <<: *kafka-common
    container_name: kafka3
    ports:
      - "9094:9094"
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 3
      KAFKA_LISTENERS: INTERNAL://kafka3:29092,CONTROLLER://kafka3:29093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka3:29092,EXTERNAL://localhost:9094
    volumes:
      - kafka3-data:/var/lib/kafka/data

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka_init
    depends_on:
      kafka1: {condition: service_healthy}
      kafka2: {condition: service_healthy}
      kafka3: {condition: service_healthy}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating topic taxi-trips-stream ..."
        kafka-topics --bootstrap-server kafka1:29092 \
          --create --if-not-exists \
          --topic taxi-trips-stream \
          --partitions 6 \
          --replication-factor 3
        echo "Topic ready. Current description:"
        kafka-topics --bootstrap-server kafka1:29092 \
          --describe --topic taxi-trips-stream

  postgres:
    image: postgres:16-alpine
    container_name: taxi_stream_postgres
    environment:
      POSTGRES_USER: taxi
      POSTGRES_PASSWORD: taxi
      POSTGRES_DB: taxi_stream
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxi -d taxi_stream"]
      interval: 5s
      timeout: 5s
      retries: 10

  consumer:
    build:
      context: .
      dockerfile: docker/Dockerfile.consumer
    container_name: taxi_consumer
    depends_on:
      kafka-init: {condition: service_completed_successfully}
      postgres: {condition: service_healthy}
    environment:
      KAFKA_BOOTSTRAP: kafka1:29092,kafka2:29092,kafka3:29092
      TOPIC: taxi-trips-stream
      PG_DSN: postgresql://taxi:taxi@postgres:5432/taxi_stream
      WINDOW_SECONDS: "300"
      WATERMARK_SECONDS: "10"
      METRICS_PORT: "8000"
    ports:
      - "8000:8000"
    restart: unless-stopped

  producer:
    build:
      context: .
      dockerfile: docker/Dockerfile.producer
    container_name: taxi_producer
    depends_on:
      kafka-init: {condition: service_completed_successfully}
    environment:
      KAFKA_BOOTSTRAP: kafka1:29092,kafka2:29092,kafka3:29092
      TOPIC: taxi-trips-stream
      EVENTS_PER_SECOND: "30"
      PARQUET_PATH: /data/yellow_tripdata_2023-01.parquet
    volumes:
      - ./data:/data:ro
    restart: on-failure

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: taxi_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: taxi_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  kafka1-data:
  kafka2-data:
  kafka3-data:
  pg-data:
