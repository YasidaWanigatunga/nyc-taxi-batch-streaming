<svg width="100%" viewBox="0 0 680 720" role="img" xmlns="http://www.w3.org/2000/svg" style="background:#fff">
<title>NYC Taxi streaming pipeline architecture</title>
<desc>Data flows from parquet through a Kafka cluster into a windowed consumer, then to PostgreSQL, monitored by Prometheus and Grafana.</desc>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .th { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
  .ts { font-size: 11px; fill: #555; }
  .tt { font-size: 10px; fill: #777; font-family: monospace; }
  .arr { stroke: #888; stroke-width: 1.2; }
  .arr-data { stroke: #1D9E75; stroke-width: 1.5; }
  .arr-metrics { stroke: #7F77DD; stroke-width: 1; stroke-dasharray: 4 3; }
</style>
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Docker network boundary -->
<rect x="20" y="10" width="640" height="610" rx="16" fill="none" stroke="#bbb" stroke-width="0.8" stroke-dasharray="6 4"/>
<text class="ts" x="36" y="30" fill="#999">Docker Compose network</text>

<!-- PARQUET SOURCE -->
<rect x="40" y="50" width="130" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text class="th" x="105" y="70" text-anchor="middle" fill="#085041">Parquet file</text>
<text class="ts" x="105" y="84" text-anchor="middle" fill="#0F6E56">Jan 2023 · 3M rows</text>

<!-- Arrow: parquet → producer -->
<line x1="170" y1="75" x2="210" y2="75" class="arr-data" marker-end="url(#ah)"/>

<!-- PRODUCER -->
<rect x="215" y="44" width="140" height="62" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text class="th" x="285" y="64" text-anchor="middle" fill="#712B13">Producer</text>
<text class="ts" x="285" y="78" text-anchor="middle" fill="#993C1D">~30 ev/s · acks=all</text>
<text class="ts" x="285" y="92" text-anchor="middle" fill="#993C1D">key: zone ID</text>

<!-- Arrow: producer → kafka -->
<line x1="285" y1="106" x2="285" y2="140" class="arr-data" marker-end="url(#ah)"/>
<text class="tt" x="292" y="128">JSON events</text>

<!-- KAFKA CLUSTER -->
<rect x="80" y="145" width="440" height="120" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text class="th" x="300" y="168" text-anchor="middle" fill="#0C447C">Kafka cluster — KRaft, 3 brokers</text>

<!-- Three brokers -->
<rect x="100" y="180" width="110" height="36" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="155" y="195" text-anchor="middle" fill="#0C447C">kafka1 :9092</text>
<text class="tt" x="155" y="210" text-anchor="middle">Leader</text>

<rect x="240" y="180" width="110" height="36" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="295" y="195" text-anchor="middle" fill="#0C447C">kafka2 :9093</text>
<text class="tt" x="295" y="210" text-anchor="middle">Leader</text>

<rect x="380" y="180" width="110" height="36" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="435" y="195" text-anchor="middle" fill="#0C447C">kafka3 :9094</text>
<text class="tt" x="435" y="210" text-anchor="middle">Leader</text>

<!-- Topic info -->
<text class="ts" x="300" y="248" text-anchor="middle" fill="#185FA5">Topic: taxi-trips-stream · 6 partitions · RF 3 · min.ISR 2</text>

<!-- Arrow: kafka → consumer -->
<line x1="300" y1="265" x2="300" y2="300" class="arr-data" marker-end="url(#ah)"/>
<text class="tt" x="307" y="286">poll (bounded 200)</text>

<!-- CONSUMER -->
<rect x="130" y="305" width="340" height="160" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text class="th" x="300" y="326" text-anchor="middle" fill="#3C3489">Consumer</text>

<!-- Window box -->
<rect x="155" y="338" width="135" height="40" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="222" y="355" text-anchor="middle" fill="#3C3489">Tumbling window</text>
<text class="tt" x="222" y="370" text-anchor="middle">5 min buckets</text>

<!-- Watermark box -->
<rect x="310" y="338" width="135" height="40" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="377" y="355" text-anchor="middle" fill="#3C3489">Watermark</text>
<text class="tt" x="377" y="370" text-anchor="middle">10s grace period</text>

<!-- Arrow window → watermark -->
<line x1="290" y1="358" x2="308" y2="358" class="arr" marker-end="url(#ah)"/>

<!-- Backpressure info -->
<rect x="155" y="390" width="290" height="32" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="300" y="407" text-anchor="middle" fill="#3C3489">Backpressure: manual commit + at-least-once</text>

<!-- Arrow: consumer back to kafka (commit) -->
<path d="M470 380 L540 380 L540 240 L522 240" fill="none" class="arr" marker-end="url(#ah)"/>
<text class="tt" x="546" y="310" fill="#777">commit</text>
<text class="tt" x="546" y="322" fill="#777">offsets</text>

<!-- Arrow: consumer → postgres -->
<line x1="220" y1="465" x2="220" y2="500" class="arr-data" marker-end="url(#ah)"/>
<text class="tt" x="140" y="488">raw append</text>

<line x1="380" y1="465" x2="380" y2="500" class="arr-data" marker-end="url(#ah)"/>
<text class="tt" x="393" y="488">agg upsert</text>

<!-- POSTGRES -->
<rect x="100" y="505" width="400" height="80" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
<text class="th" x="300" y="528" text-anchor="middle" fill="#27500A">PostgreSQL :5433</text>

<rect x="120" y="540" width="160" height="28" rx="5" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.4"/>
<text class="ts" x="200" y="558" text-anchor="middle" fill="#27500A">stream_trip_events</text>

<rect x="320" y="540" width="160" height="28" rx="5" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.4"/>
<text class="ts" x="400" y="558" text-anchor="middle" fill="#27500A">trip_window_agg</text>

<!-- PROMETHEUS -->
<rect x="40" y="420" width="75" height="44" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.6"/>
<text class="ts" x="77" y="440" text-anchor="middle" fill="#633806">Prometheus</text>
<text class="tt" x="77" y="454" text-anchor="middle">:9090</text>

<!-- GRAFANA -->
<rect x="40" y="490" width="75" height="44" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.6"/>
<text class="ts" x="77" y="510" text-anchor="middle" fill="#633806">Grafana</text>
<text class="tt" x="77" y="524" text-anchor="middle">:3000</text>

<!-- Metrics arrows -->
<line x1="215" y1="75" x2="77" y2="75" class="arr-metrics"/>
<path d="M77 75 L77 418" fill="none" class="arr-metrics" marker-end="url(#ah)"/>
<text class="tt" x="47" y="250" fill="#7F77DD">:8001</text>

<path d="M130 440 L115 440" fill="none" class="arr-metrics" marker-end="url(#ah)"/>
<text class="tt" x="95" y="395" fill="#7F77DD">:8000</text>

<!-- Prometheus → Grafana -->
<line x1="77" y1="464" x2="77" y2="488" class="arr-metrics" marker-end="url(#ah)"/>

<!-- HOST box -->
<rect x="20" y="635" width="640" height="70" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.6"/>
<text class="th" x="340" y="656" text-anchor="middle" fill="#444441">Your laptop (host)</text>
<text class="ts" x="120" y="678" text-anchor="middle" fill="#5F5E5A">localhost:9092-9094 → Kafka</text>
<text class="ts" x="300" y="678" text-anchor="middle" fill="#5F5E5A">localhost:5433 → Postgres</text>
<text class="ts" x="480" y="678" text-anchor="middle" fill="#5F5E5A">localhost:3000 → Grafana</text>
<text class="ts" x="600" y="678" text-anchor="middle" fill="#5F5E5A">:9090 → Prom</text>

<!-- Grafana panels list -->
<rect x="530" y="420" width="120" height="100" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.4"/>
<text class="ts" x="590" y="436" text-anchor="middle" fill="#633806" font-weight="600">Dashboard</text>
<text class="tt" x="540" y="452">• Throughput</text>
<text class="tt" x="540" y="466">• Consumer lag</text>
<text class="tt" x="540" y="480">• Open windows</text>
<text class="tt" x="540" y="494">• Late events</text>
<text class="tt" x="540" y="508">• Flush latency</text>

<!-- Arrow grafana → dashboard -->
<line x1="115" y1="512" x2="528" y2="470" class="arr-metrics" marker-end="url(#ah)"/>
</svg>
